<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>

  <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="post">
    <fieldset class="fieldset">
      <legend>Personal information</legend>

      <label class="row">
        Surname:
        <input type="text" name="surname" required>
      </label>

      <label class="row">
        Name:
        <input type="text" name="name">
      </label>

      <label class="row">
        How old are You?
        <input type="number" value="18" name="age" min="1" max="100">
      </label>

      <label class="row">
        Full date of birth:
        <input type="date" name="birthday">
      </label>

      <label class="row">
        <input type="checkbox" name="accepted" value="yes" required>
        I accept the term of the agreement
      </label>
    </fieldset>

    <fieldset class="fieldset">
      <legend>Registration</legend>

      <label class="row">
        E-mail:
        <input type="email" name="email" placeholder="email@example.com" required>
      </label>

      <label class="row">
        Password:
        <input
          type="password"
          name="password"
          minlength="6"
          maxlength="30"
          required
        >
      </label>
    </fieldset>

    <fieldset class="fieldset">
      <legend>An interesting fact about you!</legend>

      <div class="row">
        Do you love cats?

        <label>
          <input type="radio" name="cats" value="yes">
          Yes
        </label>

        <label>
          <input type="radio" name="cats" value="no">
          No
        </label>
      </div>

      <label class="row">
        What is your favorite color?
        <input type="color" name="color">
      </label>

      <label class="row">
        What time do you go to bed?
        <input type="time" name="time" step="1">
      </label>

      <label class="row">
        What are your favorite brand of cars?
        <select id="cars" name="cars" multiple>
          <option value="bmw">BMW</option>
          <option value="audi">Audi</option>
          <option value="skoda">Skoda</option>
        </select>
      </label>

      <label class="row">
        How do you rate our work?
        <input type="range" name="rate" min="0" max="5" step="1" value="0">
      </label>
    </fieldset>

    <fieldset class="fieldset">
      <legend>Additional info:</legend>

      <label class="row">
        Would you recommend us?
        <select id="recommend" name="recommend">
          <option value="yes">yes</option>
          <option value="no">no</option>
        </select>
      </label>

      <label class="row">
        Comments:
        <textarea name="comments"></textarea>
      </label>
    </fieldset>

    <button type="submit">Submit</button>
  </form>

</body>
</html>
